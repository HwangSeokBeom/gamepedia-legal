<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamePedia Legal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      line-height: 1.6;
      padding: 24px;
      max-width: 800px;
      margin: auto;
    }
    a {
      display: block;
      margin: 12px 0;
      font-size: 18px;
    }
    .support {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>GamePedia Legal</h1>
  <p>Select your language.</p>

  <a href="./ko/">한국어</a>
  <a href="./en/">English</a>
  <a href="./ja/">日本語</a>
  <a href="./zh-Hans/">简体中文</a>

  <div class="support">
    <h2>Support</h2>
    <p>If you have any issues while using GamePedia, please contact us below.</p>
    <p><a href="mailto:tjrqja0714@gmail.com">tjrqja0714@gmail.com</a></p>
  </div>

  <script>
    (function () {
      var language = (navigator.language || navigator.userLanguage || "en").toLowerCase();

      if (language.startsWith("ko")) {
        window.location.replace("./ko/");
      } else if (language.startsWith("ja")) {
        window.location.replace("./ja/");
      } else if (language.startsWith("zh")) {
        window.location.replace("./zh-Hans/");
      } else {
        window.location.replace("./en/");
      }
    })();
  </script>
</body>
</html>
